  <path d="M70 704h500" stroke="#e6ba63" stroke-width="7"/><path d="M120 704v96M520 704v96" stroke="#263842" stroke-width="22"/>
  <rect width="640" height="800" filter="url(#grain)" opacity=".5"/>
</svg>