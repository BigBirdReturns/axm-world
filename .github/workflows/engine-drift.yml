name: engine-drift

# Fails if the vendored shared surface (src/engine, src/arcs, tests/engine,
# tests/fixtures) has silently diverged from the axm-arc commit pinned in
# src/engine/VENDORED_FROM. Intentional changes are fine — land them in
# axm-arc first, then re-sync with `npm run engine:sync` so the pinned commit
# moves too. See RECONCILIATION.md.

on:
  push:
    paths:
      - "src/engine/**"
      - "src/arcs/**"
      - "tests/engine/**"
      - "tests/fixtures/**"
      - "scripts/check-engine-drift.sh"
      - ".github/workflows/engine-drift.yml"
  pull_request:
    paths:
      - "src/engine/**"
      - "src/arcs/**"
      - "tests/engine/**"
      - "tests/fixtures/**"
      - "scripts/check-engine-drift.sh"
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check vendored shared surface against pinned axm-arc commit
        env:
          # CI is expected to reach axm-arc; treat unreachable as a failure.
          ENGINE_DRIFT_STRICT: "1"
          # axm-arc is private: provide a token with read access if needed.
          GITHUB_TOKEN: ${{ secrets.ARC_READ_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          bash scripts/check-engine-drift.sh
