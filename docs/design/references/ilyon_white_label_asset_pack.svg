    <text class="label">Five incompatible responsibilities</text>

    <g transform="translate(0 28)">
      <rect class="panel" width="202" height="208" rx="8"/>
      <circle cx="101" cy="80" r="58" fill="#123946"/>
      <path class="body" d="M56 172V126Q101 101 146 126V172Z"/>
      <path class="skin" d="M75 78Q75 45 101 40Q127 45 127 78Q124 108 101 112Q78 108 75 78Z"/>
      <path d="M68 72Q74 28 101 30Q133 31 136 77L121 65Q100 53 78 68Z" fill="#18394a" stroke="#071016" stroke-width="3"/>
