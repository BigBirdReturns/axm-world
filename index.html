<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Rodoh Runtime — The First Charter</title>
    <meta name="theme-color" content="#0b0a08" />
    <meta name="description" content="Rodoh is an offline-capable cartridge runtime. Your cartridge and run remain yours." />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./rodoh-mark.svg" type="image/svg+xml" />
    <style>
      /* The document itself wears the runtime's ink. The boot/shell surfaces are
         viewport-sized absolute boxes; when their content scrolls past the first
         viewport, the overflow sits on <body> — which must not flash white. */
      html, body { margin: 0; max-width: 100%; overflow-x: clip; background: #0b0a08; }
      #root { min-width: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/game/main.tsx"></script>
  </body>
</html>
