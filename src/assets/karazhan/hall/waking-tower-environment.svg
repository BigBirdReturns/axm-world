    <circle cx="210" cy="198" r="140" fill="#6faedb" opacity=".16" filter="url(#softGlow)"/>
    <g fill="none" stroke-linecap="round">
      <ellipse cx="210" cy="198" rx="166" ry="62" stroke="#d19a3d" stroke-width="5" transform="rotate(-14 210 198)"/>
