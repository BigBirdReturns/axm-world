name: engine-drift

# Fails if the vendored src/engine/ has silently diverged from the axm-arc
# commit pinned in src/engine/VENDORED_FROM. Intentional engine changes are
# fine — re-sync with `npm run engine:sync` so the pinned commit moves too.

on:
  push:
    paths:
      - "src/engine/**"
      - "scripts/check-engine-drift.sh"
      - ".github/workflows/engine-drift.yml"
  pull_request:
    paths:
      - "src/engine/**"
      - "scripts/check-engine-drift.sh"
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check vendored engine against pinned axm-arc commit
        env:
          # CI is expected to reach axm-arc; treat unreachable as a failure.
          ENGINE_DRIFT_STRICT: "1"
          # axm-arc is private: provide a token with read access if needed.
          GITHUB_TOKEN: ${{ secrets.ARC_READ_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          bash scripts/check-engine-drift.sh
