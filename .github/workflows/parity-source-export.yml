name: Parity source export

on:
  push:
    branches:
      - agent/parity-source-export
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Package exact source
        run: |
          tar --exclude=.git -czf "$RUNNER_TEMP/axm-world-source.tgz" .
          sha256sum "$RUNNER_TEMP/axm-world-source.tgz" > "$RUNNER_TEMP/axm-world-source.sha256"
      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: axm-world-source
          path: |
            ${{ runner.temp }}/axm-world-source.tgz
            ${{ runner.temp }}/axm-world-source.sha256
          if-no-files-found: error
          retention-days: 1
