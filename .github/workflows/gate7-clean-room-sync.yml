name: Vendor accepted Gate 7A clean-room artifacts

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - '.github/workflows/gate7-clean-room-sync.yml'
  push:
    branches: [codex/second-recension-books-1-3-clean]
    paths:
      - '.github/workflows/gate7-clean-room-sync.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    if: github.head_ref == 'codex/second-recension-books-1-3-clean' || github.ref == 'refs/heads/codex/second-recension-books-1-3-clean'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Vendor exact accepted Gate 7A Arc head
        run: bash scripts/sync-engine.sh 94c0e965c09e090d768e73ad29f7820aa50606c0
      - name: Exact Arc provenance
        env:
          ENGINE_DRIFT_STRICT: '1'
        run: npm run engine:check
      - name: TypeScript
        run: npm run typecheck
      - name: Complete World regression suite
        run: npm test
      - name: Production build
        run: npm run build
      - name: Publish exact Gate 7A vendoring
        run: |
          git restore --source=HEAD --staged --worktree docs/game 2>/dev/null || true
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git reset -- .github/workflows/gate7-clean-room-sync.yml
          git commit -m "Vendor accepted Gate 7A clean-room artifacts"
          git push origin HEAD:codex/second-recension-books-1-3-clean
