name: Apply shell browser receipt fix

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/local-first-product-parity
          fetch-depth: 0
      - name: Update fixed-deployment browser assertion
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('e2e/shell.spec.ts')
          text = path.read_text()
          old = '''      await expect(page.getByTestId("encs-fixed-party")).toContainText("Fixed deployment");
      await expect(page.getByTestId("encs-projection-preview")).not.toHaveText("—");
      await expect(page.getByTestId("encs-commit")).toBeEnabled();'''
          new = '''      await expect(page.getByTestId("encs-fixed-party")).toContainText("Fixed deployment");
      await expect(page.getByTestId("encs-projection-preview")).toHaveCount(0);
      await expect(page.getByTestId("encs-commit")).toBeEnabled();'''
          if old not in text:
              raise SystemExit('expected shell assertion block was not found')
          path.write_text(text.replace(old, new, 1))
          PY
          git add e2e/shell.spec.ts
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Align fixed-deployment browser receipt"
          git push origin HEAD:agent/local-first-product-parity
