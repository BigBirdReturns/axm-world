    <g transform="translate(216 28)">
      <rect class="panel" width="202" height="208" rx="8"/>
      <circle cx="101" cy="80" r="58" fill="#174b55"/>
      <path class="body" d="M52 172Q56 118 101 108Q146 118 150 172Z"/>
