name: Reconcile Second Recension runtime references

on:
  push:
    branches: [codex/second-recension-books-1-3-clean]
    paths:
      - '.github/workflows/second-recension-runtime-reference-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Replace stale current references
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              'cart1_ba733f8c95998158cbd44e448ddf36af6a585c8b3bf46febfb5e04bc9ebd2383': 'cart1_17054e128dc6fd517fc47f163d92da58d72f9302a84d9d3b04589083afc10f0e',
              'cart1_13f916633c0aa03c62a81e1829b3362983b75cda003b0597ff1ded6fc06f566c': 'cart1_05530ae780a30f2f79fb0ddf030ba0e92321d736f146e8e16ddb325ae948b23e',
              'cart1_fcf35f66782fdd109fb28ce4a08dde64968f05a1659a8701600a5a10b769ae90': 'cart1_15a9f3792ff8a68948053a06cefcbf586e9960158ca051a187e1ab341b7a2e65',
          }
          suffixes = {'.ts', '.tsx', '.js', '.mjs', '.json', '.md', '.yml', '.yaml'}
          for path in Path('.').rglob('*'):
              if not path.is_file() or path.suffix not in suffixes:
                  continue
              if any(part in {'.git', 'node_modules', 'dist'} for part in path.parts):
                  continue
              if path == Path('src/world/legacy-revisions.ts'):
                  continue
              source = path.read_text()
              updated = source
              for old, new in replacements.items():
                  updated = updated.replace(old, new)
              if updated != source:
                  path.write_text(updated)

          gate6 = Path('.github/workflows/gate6-relief-circuit.yml')
          source = gate6.read_text()
          source = source.replace(
              '2abf84e4b79c8196bcfa213bca2e920e7d36caa5',
              'e4e41c7faec9755429c4f6b6f5ab715c5c3d17e5',
          )
          source = source.replace('Exact Arc Gate 5 provenance', 'Exact reviewed Arc Books I-III provenance')
          gate6.write_text(source)
          PY
      - name: TypeScript
        run: npm run typecheck
      - name: Focused identity and Gate 6 contracts
        run: >-
          npm test --
          tests/world/bundled-digests.test.ts
          tests/world/legacy-revisions.test.ts
          tests/world/second-recension-books-1-3.test.ts
          tests/world/bundled-campaign-parity.test.ts
          tests/engine/connected-operation.test.ts
          tests/engine/connected-operation-fixture.test.ts
      - name: Complete World regression suite
        run: npm test
      - name: Production build
        run: npm run build
      - name: Publish permanent reference fixes
        run: |
          git restore --source=HEAD --staged --worktree docs/game || true
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git reset -- .github/workflows/second-recension-runtime-reference-fix.yml
          git commit -m "Reconcile Second Recension runtime references"
          git push origin HEAD:codex/second-recension-books-1-3-clean
