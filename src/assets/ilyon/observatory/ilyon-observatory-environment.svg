<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">The Ilyon Confluence Observatory</title>
  <desc id="desc">An oceanic civic observatory of nacre, brass, coral, tideglass, and open water, built for astronomy and public refusal.</desc>
  <defs>
    <linearGradient id="seaSky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#173b52"/><stop offset=".44" stop-color="#0f6071"/><stop offset=".72" stop-color="#1b7f88"/><stop offset="1" stop-color="#071827"/></linearGradient>
    <linearGradient id="nacre" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff7dd"/><stop offset=".3" stop-color="#cfe7df"/><stop offset=".56" stop-color="#e5d5bb"/><stop offset=".8" stop-color="#9fc9ca"/><stop offset="1" stop-color="#7aa2ae"/></linearGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e6a18c"/><stop offset=".5" stop-color="#d68165"/><stop offset="1" stop-color="#8c4c4b"/></linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f0d99a"/><stop offset=".45" stop-color="#c9a45d"/><stop offset="1" stop-color="#7d5b2f"/></linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#fff7d2" stop-opacity=".96"/><stop offset=".34" stop-color="#d6bd82" stop-opacity=".54"/><stop offset="1" stop-color="#d6bd82" stop-opacity="0"/></radialGradient>
    <radialGradient id="tideGlow" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#8fe1db" stop-opacity=".74"/><stop offset=".5" stop-color="#48b7b0" stop-opacity=".24"/><stop offset="1" stop-color="#48b7b0" stop-opacity="0"/></radialGradient>
    <pattern id="shell" width="80" height="80" patternUnits="userSpaceOnUse"><path d="M0 40Q20 12 40 40T80 40M0 80Q20 52 40 80T80 80" fill="none" stroke="#e7e1cf" stroke-width="2" opacity=".12"/></pattern>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="24"/></filter>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%"><feTurbulence type="fractalNoise" baseFrequency=".66" numOctaves="3" seed="47"/><feComponentTransfer><feFuncA type="table" tableValues="0 .055"/></feComponentTransfer></filter>
  </defs>
