name: Apply browser modernization v2

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  issues: read
  pull-requests: read

concurrency:
  group: world-browser-modernization-publication-v2
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/local-first-product-parity'
    runs-on: ubuntu-latest
    steps:
      - name: Reconstruct authenticated patch
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: '120'
          EXPECTED_PAYLOAD_SHA256: 84ac067e4fd7fe6eab3ed66922c2ef89a68143f570ae6f478c0ec45910c8b34b
          EXPECTED_PATCH_SHA256: 2f073895780031a37551f04cd82e79c5eebada03439558e863c715e43571a9e3
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/world-browser"
          python - <<'PY'
          import base64, gzip, hashlib, json, os
          from pathlib import Path
          from urllib.request import Request, urlopen

          expected_parts = [
              ("H4sICKtLYGoCA3dvcmxkLWJyb3dz", 2000),
              ("1VGNsHRDXUCIKw6mJxqwg5dH", 2000),
              ("gs81Id/YK/ElFhxm4N/E1y6M", 2000),
              ("rltx7jvV3qMfpJMgTdFRbL8G", 2000),
              ("kWcLLR/LRhGakhe15akCCGnK", 2000),
              ("V3un+T9fwlpCRP0RwuyGb6pQ", 2000),
              ("gzq6I418eLu7fSd6Rxv/C8u0", 32),
          ]
          req = Request(
              f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/issues/{os.environ['ISSUE_NUMBER']}/comments?per_page=100",
              headers={
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urlopen(req, timeout=30) as response:
              comments = json.load(response)
          parts = []
          for prefix, expected_length in expected_parts:
              matches = []
              for comment in comments:
                  body = str(comment.get("body", "")).replace("\r", "").replace("\n", "")
                  if body.startswith(prefix) and len(body) == expected_length:
                      matches.append(body)
              if len(matches) != 1:
                  raise SystemExit(f"expected one {expected_length}-byte part beginning {prefix}; found {len(matches)}")
              parts.append(matches[0])
          payload = "".join(parts).encode("ascii")
          if hashlib.sha256(payload).hexdigest() != os.environ["EXPECTED_PAYLOAD_SHA256"]:
              raise SystemExit("payload digest mismatch")
          compressed = base64.b64decode(payload, validate=True)
          patch = gzip.decompress(compressed)
          if hashlib.sha256(patch).hexdigest() != os.environ["EXPECTED_PATCH_SHA256"]:
              raise SystemExit("patch digest mismatch")
          (Path(os.environ["RUNNER_TEMP"]) / "world-browser" / "modernization.patch").write_bytes(patch)
          PY

      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply and publish
        run: |
          set -euo pipefail
          git apply --3way --index --verbose "$RUNNER_TEMP/world-browser/modernization.patch"
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Modernize guided-entry browser receipts"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
