name: Apply World product parity

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  issues: read
  pull-requests: read

concurrency:
  group: world-product-parity-publication
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/local-first-product-parity'
    runs-on: ubuntu-latest
    steps:
      - name: Check out publication branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Reconstruct authenticated parity patch
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: '120'
          EXPECTED_PAYLOAD_SHA256: 5a67822831be07bafb0208005061a7747bb45b23327a345fecf0b256429266cb
          EXPECTED_PATCH_SHA256: 0ce737f65773d8327d7c394a9ecc3af38aaa5b8171f92dae7c27359dc74847c2
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/world-parity"
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments?per_page=100" \
            > "${RUNNER_TEMP}/world-parity/comments.json"

          jq -r '
            [
              .[] |
              if (.body | startswith("H4sICBhDYGoCA3dvcmxk")) then { rank: 0, body: .body }
              elif (.body | startswith("TcAPihQHWyJyp+h/9Ti1")) then { rank: 1, body: .body }
              elif (.body | startswith("k5URbiBHWc7InuF7K60S")) then { rank: 2, body: .body }
              elif (.body | startswith("ewnP8yd//qN/8/Wf/vPs")) then { rank: 3, body: .body }
              elif (.body | startswith("Mze3Ac8fu8vJIv0K5f4o")) then { rank: 4, body: .body }
              else empty end
            ] | sort_by(.rank) | .[].body
          ' "${RUNNER_TEMP}/world-parity/comments.json" \
            | tr -d '\r\n' \
            > "${RUNNER_TEMP}/world-parity/world-parity.patch.gz.b64"

          test "$(jq '[.[] | select(.body | startswith("H4sICBhDYGoCA3dvcmxk") or startswith("TcAPihQHWyJyp+h/9Ti1") or startswith("k5URbiBHWc7InuF7K60S") or startswith("ewnP8yd//qN/8/Wf/vPs") or startswith("Mze3Ac8fu8vJIv0K5f4o"))] | length' "${RUNNER_TEMP}/world-parity/comments.json")" = "5"
          test "$(sha256sum "${RUNNER_TEMP}/world-parity/world-parity.patch.gz.b64" | cut -d' ' -f1)" = "${EXPECTED_PAYLOAD_SHA256}"
          base64 --decode "${RUNNER_TEMP}/world-parity/world-parity.patch.gz.b64" > "${RUNNER_TEMP}/world-parity/world-parity.patch.gz"
          gzip -dc "${RUNNER_TEMP}/world-parity/world-parity.patch.gz" > "${RUNNER_TEMP}/world-parity/world-parity.patch"
          test "$(sha256sum "${RUNNER_TEMP}/world-parity/world-parity.patch" | cut -d' ' -f1)" = "${EXPECTED_PATCH_SHA256}"

          if git apply --reverse --check "${RUNNER_TEMP}/world-parity/world-parity.patch"; then
            echo "World parity patch is already applied."
            echo "already_applied=true" >> "${GITHUB_ENV}"
            exit 0
          fi

          git apply --check "${RUNNER_TEMP}/world-parity/world-parity.patch"
          git apply --index "${RUNNER_TEMP}/world-parity/world-parity.patch"
          echo "already_applied=false" >> "${GITHUB_ENV}"

      - name: Install dependencies
        if: env.already_applied == 'false'
        run: npm ci

      - name: Verify complete World product parity
        if: env.already_applied == 'false'
        run: |
          find src tests e2e \( -name "*.js" -o -name "*.js.map" -o -name "*.d.ts" \) -delete
          rm -f tsconfig.tsbuildinfo
          npm run check
          npm run build
          git diff --cached --check

      - name: Publish reviewed source commit
        if: env.already_applied == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Complete World local-first product parity"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
