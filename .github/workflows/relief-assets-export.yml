name: Relief Circuit asset export

on:
  push:
    branches: [art/relief-circuit-production-pack]
    paths:
      - '.github/workflows/relief-assets-export.yml'
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - '.github/workflows/relief-assets-export.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'art/relief-circuit-production-pack' || github.ref == 'refs/heads/art/relief-circuit-production-pack'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Record exact source identity
        run: git rev-parse HEAD > relief-assets-source-sha.txt
      - uses: actions/upload-artifact@v4
        with:
          name: relief-circuit-production-assets
          path: |
            src/assets/relief-circuit/vessel
            tests/world/relief-circuit-production-assets.test.ts
            relief-assets-source-sha.txt
          retention-days: 7
