      <path d="M58 68Q75 25 101 34Q128 24 145 70L128 58Q101 47 73 61Z" fill="#2d6c70" stroke="#071016" stroke-width="3"/>
      <path class="trim" d="M58 132Q101 152 144 132"/>
      <circle cx="89" cy="77" r="3" fill="#071016"/><circle cx="113" cy="77" r="3" fill="#071016"/>
