<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">The Waking Tower white-label visual asset pack</title>
  <desc id="desc">A violet-night reference sheet showing five raid roles, the tower emblem, and encounter motifs used by the local pixel and vector runtime assets.</desc>
