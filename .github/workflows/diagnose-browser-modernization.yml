name: Diagnose browser modernization

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  exercise:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    outputs:
      patched: ${{ steps.patch.outputs.patched }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/local-first-product-parity
          fetch-depth: 0
          show-progress: false
      - name: Apply the guided mobile identity boundary once
        id: patch
        shell: bash
        run: |
          set -euo pipefail
          target=src/world/experience/ExperienceHost.tsx
          if grep -q 'const isMobile = useIsMobile();' "$target"; then
            echo 'patched=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python <<'PY'
          from pathlib import Path

          path = Path("src/world/experience/ExperienceHost.tsx")
          text = path.read_text()

          imports = 'import { t } from "../i18n/index.js";\n'
          replacement = imports + 'import { useIsMobile } from "../use-viewport.js";\n'
          if imports not in text:
              raise SystemExit("identity import anchor missing")
          text = text.replace(imports, replacement, 1)

          signature = 'export function ExperienceHost({ world, onExit, onEnterRuntime }: Props): JSX.Element {\n'
          if signature not in text:
              raise SystemExit("ExperienceHost signature anchor missing")
          text = text.replace(signature, signature + '  const isMobile = useIsMobile();\n', 1)

          opening = '      <header className="axm-experience__identity" data-testid="program-identity-strip">\n'
          if opening not in text:
              raise SystemExit("guided identity opening anchor missing")
          text = text.replace(opening, '      {!isMobile && (\n        <header className="axm-experience__identity" data-testid="program-identity-strip">\n', 1)

          closing = '      </header>\n\n      <section className="axm-experience__stage">\n'
          if closing not in text:
              raise SystemExit("guided identity closing anchor missing")
          text = text.replace(closing, '        </header>\n      )}\n\n      <section className="axm-experience__stage">\n', 1)

          path.write_text(text)
          PY
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add "$target"
          git commit -m "Keep guided program identity desktop-only"
          git push origin HEAD:agent/local-first-product-parity
          echo 'patched=true' >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v4
        if: steps.patch.outputs.patched != 'true'
        with:
          node-version: 22
          cache: npm
      - if: steps.patch.outputs.patched != 'true'
        run: npm ci --silent
      - if: steps.patch.outputs.patched != 'true'
        run: npx playwright install --with-deps chromium >/dev/null
      - name: Run exact identity-strip path against owned Vite server
        if: steps.patch.outputs.patched != 'true'
        id: browser
        continue-on-error: true
        env:
          PW_BASE_URL: http://127.0.0.1:5173
        run: |
          set -uo pipefail
          npm run dev -- --host 127.0.0.1 >"$RUNNER_TEMP/vite.log" 2>&1 &
          vite_pid=$!
          trap 'kill "$vite_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 60); do
            if curl -fsS "$PW_BASE_URL/axm-world/game/" >/dev/null; then break; fi
            sleep 1
          done
          export PW_CHROMIUM_PATH="$(node -e 'const { chromium } = require("playwright"); process.stdout.write(chromium.executablePath())')"
          set +e
          npx playwright test e2e/program-001-identity-strip.spec.ts --workers=1 --reporter=json >"$RUNNER_TEMP/playwright.json" 2>"$RUNNER_TEMP/playwright.stderr"
          status=$?
          set -e
          printf '%s\n' "$status" >"$RUNNER_TEMP/status.txt"
          JSON_PATH="$RUNNER_TEMP/playwright.json" SUMMARY_PATH="$RUNNER_TEMP/browser-summary.txt" node <<'NODE'
          const fs = require('node:fs');
          const data = JSON.parse(fs.readFileSync(process.env.JSON_PATH, 'utf8'));
          const lines = [];
          const stats = data.stats ?? {};
          lines.push(`IDENTITY-STRIP STATS expected=${stats.expected ?? 0} unexpected=${stats.unexpected ?? 0} skipped=${stats.skipped ?? 0} flaky=${stats.flaky ?? 0}`);
          function walk(suites, parents = []) {
            for (const suite of suites ?? []) {
              const here = suite.title ? [...parents, suite.title] : parents;
              for (const spec of suite.specs ?? []) {
                for (const test of spec.tests ?? []) {
                  const bad = test.status === 'unexpected' || (test.results ?? []).some((result) => ['failed', 'timedOut', 'interrupted'].includes(result.status));
                  if (!bad) continue;
                  lines.push(`FAIL [${test.projectName ?? test.projectId ?? 'unknown'}] ${[...here, spec.title].filter(Boolean).join(' > ')}`);
                  for (const result of test.results ?? []) {
                    if (!['failed', 'timedOut', 'interrupted'].includes(result.status)) continue;
                    const error = result.error ?? result.errors?.[0] ?? {};
                    const message = String(error.message ?? error.stack ?? error.value ?? 'no error message').replace(/\u001b\[[0-9;]*m/g, '');
                    lines.push(message.slice(0, 2400));
                  }
                }
              }
              walk(suite.suites, here);
            }
          }
          walk(data.suites);
          fs.writeFileSync(process.env.SUMMARY_PATH, `${lines.join('\n\n')}\n`);
          NODE
      - name: Upload compact receipt
        if: steps.patch.outputs.patched != 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-compact-receipt
          path: |
            ${{ runner.temp }}/browser-summary.txt
            ${{ runner.temp }}/status.txt
            ${{ runner.temp }}/playwright.stderr
            ${{ runner.temp }}/vite.log
          if-no-files-found: error
          retention-days: 1

  report:
    if: always() && needs.exercise.outputs.patched != 'true'
    needs: exercise
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: browser-compact-receipt
          path: receipt
      - name: Exact identity-strip receipt
        run: |
          cat receipt/browser-summary.txt
          test "$(cat receipt/status.txt)" -eq 0
