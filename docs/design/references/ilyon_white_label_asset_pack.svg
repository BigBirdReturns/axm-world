      <g transform="translate(880)"><rect class="panel" width="164" height="128" rx="8"/><path class="motifCoral" d="M30 98Q50 60 66 70Q82 80 98 46Q112 18 136 24"/><path class="motifCoral" d="M112 16H140V44"/><circle cx="32" cy="96" r="8" fill="#d68165"/><text x="18" y="118" class="small">CARRY EVIDENCE</text></g>
