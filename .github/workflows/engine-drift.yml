name: engine-drift

# Fails if any path in the complete Arc source/execution plane has silently
# diverged from the exact commit recorded in src/engine/VENDORED_FROM.
on:
  push:
    paths:
      - "src/engine/**"
      - "src/arcs/**"
      - "src/godscar/**"
      - "src/dark-tomb/**"
      - "src/common-ship/**"
      - "src/source-planes/**"
      - "tests/engine/**"
      - "tests/fixtures/**"
      - "tests/godscar/**"
      - "tests/dark-tomb/**"
      - "tests/common-ship/**"
      - "tests/source-planes/**"
      - "cartridges/**"
      - "scripts/check-engine-drift.sh"
      - "scripts/sync-engine.sh"
      - "RECONCILIATION.md"
      - ".github/workflows/engine-drift.yml"
  pull_request:
    paths:
      - "src/engine/**"
      - "src/arcs/**"
      - "src/godscar/**"
      - "src/dark-tomb/**"
      - "src/common-ship/**"
      - "src/source-planes/**"
      - "tests/engine/**"
      - "tests/fixtures/**"
      - "tests/godscar/**"
      - "tests/dark-tomb/**"
      - "tests/common-ship/**"
      - "tests/source-planes/**"
      - "cartridges/**"
      - "scripts/check-engine-drift.sh"
      - "scripts/sync-engine.sh"
      - "RECONCILIATION.md"
      - ".github/workflows/engine-drift.yml"
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Check complete vendored surface against pinned Arc commit
        env:
          ENGINE_DRIFT_STRICT: "1"
          GITHUB_TOKEN: ${{ secrets.ARC_READ_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          bash scripts/check-engine-drift.sh
