name: Production asset wave one application

on:
  push:
    branches: [art/production-asset-wave-one]
    paths:
      - 'tools/apply-production-asset-wave-one.py'
      - '.github/workflows/production-asset-wave-one-apply.yml'
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - 'tools/apply-production-asset-wave-one.py'
      - '.github/workflows/production-asset-wave-one-apply.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: production-asset-wave-one-application
  cancel-in-progress: true

jobs:
  apply:
    if: github.head_ref == 'art/production-asset-wave-one' || github.ref == 'refs/heads/art/production-asset-wave-one'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Bind assets into the player
        run: python tools/apply-production-asset-wave-one.py
      - run: npm ci
      - name: TypeScript
        run: npm run typecheck
      - name: Focused asset contracts
        run: npm test -- tests/world/production-asset-wave-one.test.ts
      - name: Complete World regression suite
        run: npm test
      - name: Production build
        run: npm run build
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Desktop and mobile asset acceptance
        id: browser
        continue-on-error: true
        env:
          PW_BASE_URL: http://127.0.0.1:5173
        run: |
          set -euo pipefail
          mkdir -p production-asset-receipt
          npm run dev -- --host 127.0.0.1 >production-asset-receipt/vite.log 2>&1 &
          vite_pid=$!
          cleanup() {
            kill "$vite_pid" 2>/dev/null || true
            wait "$vite_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          ready=0
          for attempt in $(seq 1 90); do
            if curl -fsS "$PW_BASE_URL/axm-world/game/" >/dev/null; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            echo 'Owned Vite server did not become ready.' | tee production-asset-receipt/playwright-summary.txt
            exit 1
          fi

          export PW_CHROMIUM_PATH="$(node -e 'const { chromium } = require("playwright"); process.stdout.write(chromium.executablePath())')"
          set +e
          npx playwright test e2e/production-asset-wave-one.spec.ts --workers=1 --reporter=list --trace=retain-on-failure \
            >production-asset-receipt/playwright.log 2>&1
          status=$?
          set -e
          cat production-asset-receipt/playwright.log
          exit "$status"
      - name: Upload browser acceptance receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-asset-wave-one-browser-receipt
          path: |
            production-asset-receipt
            test-results
            playwright-report
          if-no-files-found: warn
          retention-days: 14
      - name: Preserve browser failure
        if: steps.browser.outcome == 'failure'
        run: exit 1
      - name: Keep generated deployment output outside source authority
        run: git restore --source=HEAD --staged --worktree docs/game || true
      - name: Publish the verified player binding
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/world/Player.tsx
          git commit -m "Bind production asset wave one into Rodoh"
          git push origin HEAD:art/production-asset-wave-one