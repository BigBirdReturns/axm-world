name: Gate 4 source export

on:
  push:
    branches: [codex/gate4-lamp-district-world]
    paths:
      - '.github/workflows/gate4-export-source.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/gate4-lamp-district-world
          fetch-depth: 0
      - name: Record exact source identity
        run: git rev-parse HEAD > gate4-source-sha.txt
      - name: Upload complete source tree
        uses: actions/upload-artifact@v4
        with:
          name: gate4-world-source
          path: |
            .
            !.git/**
            !node_modules/**
          include-hidden-files: true
          retention-days: 7
