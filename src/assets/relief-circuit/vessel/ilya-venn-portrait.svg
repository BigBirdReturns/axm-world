<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 800" role="img" aria-labelledby="title desc">
  <title id="title">Ilya Venn, rapid-response pilot</title>
  <desc id="desc">A dry-bodied pilot in a direct-interface flight harness, standing before the Relief Circuit helm with manual abort controls and several incompatible habitat clocks reflected in the canopy.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1c3442"/><stop offset=".52" stop-color="#101c27"/><stop offset="1" stop-color="#060a0f"/></linearGradient>
    <linearGradient id="suit" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#668596"/><stop offset=".48" stop-color="#334e60"/><stop offset="1" stop-color="#152430"/></linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#efd0b5"/><stop offset=".55" stop-color="#c89678"/><stop offset="1" stop-color="#825b4b"/></linearGradient>
    <radialGradient id="helm" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#d9f5ff" stop-opacity=".92"/><stop offset=".34" stop-color="#6ed3e6" stop-opacity=".48"/><stop offset="1" stop-color="#6ed3e6" stop-opacity="0"/></radialGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%"><feTurbulence type="fractalNoise" baseFrequency=".74" numOctaves="3" seed="89"/><feComponentTransfer><feFuncA type="table" tableValues="0 .06"/></feComponentTransfer></filter>
  </defs>
