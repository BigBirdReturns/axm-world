name: Publish Gate 7 generic resource and decision-drain fix

on:
  push:
    branches: [codex/second-recension-books-1-3-clean]
    paths:
      - '.github/workflows/gate7-generic-resource-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Expose the complete authored resource vocabulary and drain bounded decisions
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              source = target.read_text()
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one replacement, found {count}")
              target.write_text(source.replace(old, new))

          replace_once(
              "src/play-pipeline/compile.ts",
              '''  resources: {
              currency: number;
              tokens: number;
              reputation: number;
              currencyName: string;
              tokenName: string;
              reputationName: string;
            };'''.replace("            ", ""),
              '''  resources: {
              currency: number;
              materials: number;
              tokens: number;
              reputation: number;
              currencyName: string;
              materialName: string;
              tokenName: string;
              reputationName: string;
            };'''.replace("            ", ""),
          )
          replace_once(
              "src/play-pipeline/compile.ts",
              '''    resources: {
              currency: org.resources.currency,
              tokens: org.resources.tokens,
              reputation: org.reputation,
              currencyName: arc.currencyName,
              tokenName: arc.tokenName,
              reputationName: arc.reputationName,
            },'''.replace("            ", ""),
              '''    resources: {
              currency: org.resources.currency,
              materials: org.resources.materials,
              tokens: org.resources.tokens,
              reputation: org.reputation,
              currencyName: arc.currencyName,
              materialName: arc.materialName,
              tokenName: arc.tokenName,
              reputationName: arc.reputationName,
            },'''.replace("            ", ""),
          )
          replace_once(
              "src/world/useArcWorld.ts",
              '''  resources: {
              currency: number;
              tokens: number;
              reputation: number;
              currencyName: string;
              tokenName: string;
              reputationName: string;
            };'''.replace("            ", ""),
              '''  resources: {
              currency: number;
              materials: number;
              tokens: number;
              reputation: number;
              currencyName: string;
              materialName: string;
              tokenName: string;
              reputationName: string;
            };'''.replace("            ", ""),
          )
          replace_once(
              "src/world/shell/regions.tsx",
              '  resources: { currency: number; tokens: number; reputation: number; currencyName: string; tokenName: string; reputationName: string };',
              '  resources: { currency: number; materials: number; tokens: number; reputation: number; currencyName: string; materialName: string; tokenName: string; reputationName: string };',
          )
          replace_once(
              "src/world/shell/regions.tsx",
              '''        <StatusChip label={resources.currencyName} value={String(resources.currency)} />
                    <StatusChip label={resources.reputationName} value={String(resources.reputation)} />'''.replace("                    ", "        "),
              '''        <StatusChip label={resources.currencyName} value={String(resources.currency)} />
                    <StatusChip label={resources.materialName} value={String(resources.materials)} />
                    <StatusChip label={resources.reputationName} value={String(resources.reputation)} />'''.replace("                    ", "        "),
          )
          replace_once(
              "e2e/helpers.ts",
              '  for (let i = 0; i < 20 && (await card.count()) > 0; i++) {',
              '  for (let i = 0; i < 100 && (await card.count()) > 0; i++) {',
          )

          Path("tests/world/gate7-resource-vocabulary.test.ts").write_text('''import { describe, expect, it } from "vitest";
          import orchard from "../../cartridges/clean-room/orchard-at-low-tide.arc.json";
          import { foundOrganization } from "../../src/engine/founding.js";
          import { validateArc } from "../../src/engine/schema.js";
          import { compileArcToPlayScene } from "../../src/play-pipeline/compile.js";

          describe("generic authored resource vocabulary", () => {
            it("projects both the material quantity and cartridge-authored material name", () => {
              const arc = validateArc(orchard);
              const org = foundOrganization(arc, { format: "axm-founding-input/1", seed: 2707 });
              const scene = compileArcToPlayScene(arc, org);
              expect(scene.resources).toMatchObject({
                currencyName: "Civic Credit",
                materialName: "Rootstock",
                tokenName: "Lanterns",
                reputationName: "Season Standing",
                materials: org.resources.materials,
              });
            });
          });
          '''.replace("          ", ""))
          PY
      - name: TypeScript
        run: npm run typecheck
      - name: Focused Gate 7 contracts
        run: npm test -- tests/world/gate7-resource-vocabulary.test.ts tests/world/clean-room-gate7.test.ts
      - name: Complete World regression suite
        run: npm test
      - name: Production build
        run: npm run build
      - name: Publish permanent generic fix
        run: |
          git restore --source=HEAD --staged --worktree docs/game 2>/dev/null || true
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/play-pipeline/compile.ts src/world/useArcWorld.ts src/world/shell/regions.tsx e2e/helpers.ts tests/world/gate7-resource-vocabulary.test.ts
          git commit -m "Expose generic material resources in Rodoh"
          git push origin HEAD:codex/second-recension-books-1-3-clean
