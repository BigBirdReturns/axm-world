<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 800" role="img" aria-labelledby="title desc">
  <title id="title">Aster Neral, astronomer of Ilyon</title>
  <desc id="desc">An Ilyon astronomer in deep teal and nacre robes, holding a brass lens before an ocean observatory and the dead neighboring star.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#144555"/><stop offset=".52" stop-color="#0b2d3b"/><stop offset="1" stop-color="#031019"/></linearGradient>
    <linearGradient id="robe" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2f7f80"/><stop offset=".48" stop-color="#174956"/><stop offset="1" stop-color="#092633"/></linearGradient>
    <linearGradient id="nacre" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff5d7"/><stop offset=".36" stop-color="#d2e8df"/><stop offset=".68" stop-color="#d9c7a8"/><stop offset="1" stop-color="#78a7aa"/></linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e5bc97"/><stop offset=".55" stop-color="#c98f70"/><stop offset="1" stop-color="#8b584f"/></linearGradient>
    <radialGradient id="lens" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#eafff9" stop-opacity=".96"/><stop offset=".28" stop-color="#7dd3cd" stop-opacity=".72"/><stop offset="1" stop-color="#48b7b0" stop-opacity="0"/></radialGradient>
