name: Gate 6 review fixes

on:
  push:
    branches: [codex/gate6-common-ship-prep]
    paths:
      - '.github/workflows/gate6-review-fixes.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gate6-review-fixes
  cancel-in-progress: true

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out exact Gate 6 candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply the four reviewed corrections
        run: python tools/gate6-review-fixes/apply.py
      - run: npm ci
      - name: TypeScript
        run: npm run typecheck
      - name: Review regression contracts
        run: >-
          npm test --
          tests/world/gate6-review-regressions.test.ts
          tests/world/i18n-coverage.test.ts
          tests/world/locale.test.ts
          tests/world/common-ship-receiver-prep.test.ts
          tests/world/common-ship-preparation-cycle.test.ts
          tests/world/relief-circuit-production-assets.test.ts
          tests/world/cartridge-parity.test.ts
          tests/world/program-of-record.test.ts
          tests/world/bundled-campaign-parity.test.ts
          tests/engine/connected-operation-fixture.test.ts
      - name: Complete World regression suite
        run: npm test
      - name: Production build
        run: npm run build
      - name: Keep generated deployment output outside source authority
        run: git restore --source=HEAD --staged --worktree docs/game || true
      - name: Publish the reviewed candidate
        run: |
          rm -rf tools/gate6-review-fixes
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git reset -- .github/workflows
          git commit -m "Address Gate 6 review findings"
          git push origin HEAD:codex/gate6-common-ship-prep
