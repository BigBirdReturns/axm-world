name: Bundled product parity

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'src/world/**'
      - 'src/arcs/**'
      - 'src/engine/**'
      - 'src/godscar/**'
      - 'src/dark-tomb/**'
      - 'src/common-ship/**'
      - 'src/source-planes/**'
      - 'src/assets/lamp-district/**'
      - 'src/assets/relief-circuit/**'
      - 'cartridges/**'
      - 'tests/engine/**'
      - 'tests/fixtures/**'
      - 'tests/godscar/**'
      - 'tests/dark-tomb/**'
      - 'tests/common-ship/**'
      - 'tests/source-planes/**'
      - 'tests/world/**'
      - 'e2e/**'
      - 'docs/design/**'
      - 'RECONCILIATION.md'
      - 'scripts/sync-engine.sh'
      - 'scripts/check-engine-drift.sh'
      - 'scripts/verify-relief-circuit-gate6.mjs'
      - 'scripts/run-relief-circuit-gate6.mjs'
      - 'package.json'
      - 'docs/RELIEF_CIRCUIT_WORLD_ACCEPTANCE.md'
      - 'docs/RODOH_1_0_ACCEPTANCE.md'
      - '.github/workflows/bundled-parity.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  parity:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Record exact candidate identity
        env:
          CANDIDATE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          mkdir -p acceptance-receipt
          actual_sha="$(git rev-parse HEAD)"
          printf '%s\n' "$CANDIDATE_SHA" | tee acceptance-receipt/world-candidate-sha.txt
          printf '%s\n' "$actual_sha" | tee acceptance-receipt/checkout-sha.txt
          test "$actual_sha" = "$CANDIDATE_SHA"
          cat src/engine/VENDORED_FROM | tee acceptance-receipt/arc-source-plane.txt
          git diff --check
      - name: Exact Arc provenance
        env:
          ENGINE_DRIFT_STRICT: '1'
        run: |
          set -o pipefail
          npm run engine:check | tee acceptance-receipt/engine-drift.log
      - name: TypeScript
        run: |
          set -o pipefail
          npm run typecheck | tee acceptance-receipt/typecheck.log
      - name: Parity contracts
        run: |
          set -o pipefail
          npm test -- \
            tests/world/cartridge-parity.test.ts \
            tests/world/bundled-campaign-parity.test.ts \
            tests/world/sensory-prefs.test.ts \
            tests/world/asset-standard.test.ts \
            tests/world/i18n-coverage.test.ts \
            tests/world/source-plane-inspection.test.ts \
            tests/world/underworld-receiver.test.ts \
            tests/world/lamp-district-cartridge.test.ts \
            tests/world/lamp-district-assets.test.ts \
            tests/world/common-ship-receiver-prep.test.ts \
            tests/world/common-ship-preparation-cycle.test.ts \
            tests/world/relief-circuit-production-assets.test.ts \
            tests/world/program-of-record.test.ts \
            tests/engine/connected-operation.test.ts \
            tests/engine/connected-operation-fixture.test.ts \
            tests/godscar/godscar.test.ts \
            tests/dark-tomb/dark-tomb.test.ts \
            tests/common-ship/common-ship.test.ts \
            tests/source-planes/registry.test.ts \
            | tee acceptance-receipt/parity-contracts.log
      - name: Complete World regression suite
        run: |
          set -o pipefail
          npm test | tee acceptance-receipt/vitest.log
      - name: Production build
        run: |
          set -o pipefail
          npm run build | tee acceptance-receipt/build.log
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Complete desktop and mobile browser suite
        id: browser
        continue-on-error: true
        env:
          PW_BASE_URL: http://127.0.0.1:5173
        run: |
          set -euo pipefail
          npm run dev -- --host 127.0.0.1 --port 5173 --strictPort >acceptance-receipt/vite.log 2>&1 &
          vite_pid=$!
          cleanup() {
            kill "$vite_pid" 2>/dev/null || true
            wait "$vite_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          ready=0
          for attempt in $(seq 1 90); do
            if curl -fsS "$PW_BASE_URL/axm-world/game/" >/dev/null; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            echo 'Owned Vite server did not become ready.' | tee acceptance-receipt/playwright-summary.txt
            exit 1
          fi

          export PW_CHROMIUM_PATH="$(node -e 'const { chromium } = require("playwright"); process.stdout.write(chromium.executablePath())')"
          set +e
          npx playwright test --workers=1 --reporter=json --trace=retain-on-failure \
            >acceptance-receipt/playwright.json \
            2>acceptance-receipt/playwright.stderr
          status=$?
          printf '%s\n' "$status" >acceptance-receipt/playwright.status

          gate6_desktop=99
          gate6_mobile=99
          if [ "$status" -eq 0 ]; then
            GATE6_RECEIPT_DIR=acceptance-receipt/gate6/desktop \
              node scripts/verify-relief-circuit-gate6.mjs all desktop \
              >acceptance-receipt/gate6-desktop.log 2>&1
            gate6_desktop=$?
            if [ "$gate6_desktop" -eq 0 ]; then
              GATE6_RECEIPT_DIR=acceptance-receipt/gate6/mobile \
                node scripts/verify-relief-circuit-gate6.mjs all mobile \
                >acceptance-receipt/gate6-mobile.log 2>&1
              gate6_mobile=$?
            fi
          fi
          printf '%s\n' "$gate6_desktop" >acceptance-receipt/gate6-desktop.status
          printf '%s\n' "$gate6_mobile" >acceptance-receipt/gate6-mobile.status
          set -e

          node <<'NODE'
          const fs = require('node:fs');
          const path = 'acceptance-receipt/playwright.json';
          const lines = [];
          let data = {};
          try {
            data = JSON.parse(fs.readFileSync(path, 'utf8'));
          } catch (error) {
            lines.push(`PLAYWRIGHT REPORT UNREADABLE: ${String(error)}`);
          }
          const stats = data.stats ?? {};
          lines.unshift(
            `PLAYWRIGHT STATS expected=${stats.expected ?? 0} unexpected=${stats.unexpected ?? 0} skipped=${stats.skipped ?? 0} flaky=${stats.flaky ?? 0} durationMs=${stats.duration ?? 0}`,
          );
          function walk(suites, parents = []) {
            for (const suite of suites ?? []) {
              const here = suite.title ? [...parents, suite.title] : parents;
              for (const spec of suite.specs ?? []) {
                for (const test of spec.tests ?? []) {
                  const name = [...here, spec.title].filter(Boolean).join(' > ');
                  const project = test.projectName ?? test.projectId ?? 'unknown';
                  if (test.status === 'skipped') {
                    const reasons = (test.annotations ?? [])
                      .map((annotation) => annotation.description ?? annotation.type)
                      .filter(Boolean)
                      .join('; ');
                    lines.push(`SKIP [${project}] ${name}${reasons ? ` :: ${reasons}` : ''}`);
                  }
                  const failed = test.status === 'unexpected' || (test.results ?? []).some((result) => ['failed', 'timedOut', 'interrupted'].includes(result.status));
                  if (!failed) continue;
                  lines.push(`FAIL [${project}] ${name}`);
                  for (const result of test.results ?? []) {
                    if (!['failed', 'timedOut', 'interrupted'].includes(result.status)) continue;
                    const error = result.error ?? result.errors?.[0] ?? {};
                    const message = String(error.message ?? error.stack ?? error.value ?? 'no error message')
                      .replace(/\u001b\[[0-9;]*m/g, '');
                    lines.push(message.slice(0, 5000));
                  }
                }
              }
              walk(suite.suites, here);
            }
          }
          walk(data.suites);
          const readStatus = (name) => {
            try { return fs.readFileSync(`acceptance-receipt/${name}.status`, 'utf8').trim(); }
            catch { return 'missing'; }
          };
          lines.push(`GATE6 DESKTOP status=${readStatus('gate6-desktop')}`);
          lines.push(`GATE6 MOBILE status=${readStatus('gate6-mobile')}`);
          fs.writeFileSync('acceptance-receipt/playwright-summary.txt', `${lines.join('\n\n')}\n`);
          NODE
          cat acceptance-receipt/playwright-summary.txt
          cat acceptance-receipt/gate6-desktop.log 2>/dev/null || true
          cat acceptance-receipt/gate6-mobile.log 2>/dev/null || true
          test "$status" -eq 0
          test "$gate6_desktop" -eq 0
          test "$gate6_mobile" -eq 0
      - name: Upload permanent acceptance receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundled-product-parity-receipt
          path: |
            acceptance-receipt
            test-results
          if-no-files-found: warn
          retention-days: 14
      - name: Preserve browser gate status
        if: steps.browser.outcome == 'failure'
        run: exit 1
