name: Diagnose browser modernization

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/local-first-product-parity
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run shell representation path
        id: shell
        continue-on-error: true
        env:
          PW_BASE_URL: http://localhost:5173
        run: |
          set -o pipefail
          export PW_CHROMIUM_PATH="$(node -e 'const { chromium } = require("playwright"); process.stdout.write(chromium.executablePath())')"
          npx playwright test e2e/shell.spec.ts --workers=1 --reporter=line 2>&1 | tee "$RUNNER_TEMP/shell.log"
      - name: Upload diagnostic receipts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shell-diagnostic
          path: |
            ${{ runner.temp }}/shell.log
            test-results
          if-no-files-found: warn
          retention-days: 1
      - name: Preserve failure status
        if: steps.shell.outcome == 'failure'
        run: exit 1
