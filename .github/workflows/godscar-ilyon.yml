name: Godscar Ilyon receiver

on:
  push:
    branches:
      - agent/godscar-ilyon-runtime
  pull_request:
    paths:
      - 'cartridges/**'
      - 'src/arcs/**'
      - 'src/engine/**'
      - 'src/godscar/**'
      - 'src/world/aperture/**'
      - 'src/world/cartridge.ts'
      - 'src/world/themes/**'
      - 'src/world/i18n/**'
      - 'tests/godscar/**'
      - 'tests/world/godscar-*.test.ts'
      - 'e2e/honest-opening.spec.ts'
      - '.github/workflows/godscar-ilyon.yml'

permissions:
  contents: read

jobs:
  receiver:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out World
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify exact Arc provenance
        env:
          ENGINE_DRIFT_STRICT: '1'
        run: npm run engine:check

      - name: Verify Godscar projection and cartridge contract
        run: >-
          npm test --
          tests/godscar/artifacts.test.ts
          tests/godscar/godscar.test.ts
          tests/world/godscar-aperture.test.ts
          tests/world/godscar-cartridge.test.ts
          tests/world/bundled-digests.test.ts
          tests/world/runtime-router.test.ts
          tests/world/theme-select.test.ts

      - name: Verify production build
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify Ilyon on desktop and mobile
        env:
          PW_BASE_URL: http://localhost:5173
        run: |
          export PW_CHROMIUM_PATH="$(node -e 'const { chromium } = require("playwright"); process.stdout.write(chromium.executablePath())')"
          npx playwright test e2e/honest-opening.spec.ts --grep "Ilyon" --workers=1
