<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="880" viewBox="0 0 1200 880" role="img" aria-labelledby="title desc">
  <title id="title">The Kind Gods of Ilyon — white-label visual asset pack</title>
  <desc id="desc">Reference sheet for Ilyon palette, role silhouettes, campaign motifs, faction marks, and evidence language.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071827"/>
      <stop offset="0.58" stop-color="#0b2d3b"/>
      <stop offset="1" stop-color="#031019"/>
    </linearGradient>
    <radialGradient id="halo">
      <stop offset="0" stop-color="#48b7b0" stop-opacity=".26"/>
      <stop offset="1" stop-color="#48b7b0" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#e7e1cf" stroke-opacity=".045"/>
    </pattern>
    <style>
      .label{font:700 16px system-ui,sans-serif;letter-spacing:.12em;text-transform:uppercase;fill:#d6bd82}
      .small{font:500 12px ui-monospace,monospace;letter-spacing:.08em;fill:#8eb6b3}
      .name{font:800 20px system-ui,sans-serif;fill:#e7e1cf}
      .body{fill:#123f4b;stroke:#071016;stroke-width:3}
      .skin{fill:#d7ad88;stroke:#071016;stroke-width:3}
      .trim{fill:none;stroke:#d68165;stroke-width:4}
      .gold{fill:none;stroke:#c9a45d;stroke-width:4}
      .tide{fill:none;stroke:#48b7b0;stroke-width:4}
      .nacre{fill:#e7e1cf}
      .panel{fill:#071827;fill-opacity:.82;stroke:#397d82;stroke-width:1.5}
      .motif{fill:none;stroke:#48b7b0;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .motifGold{fill:none;stroke:#c9a45d;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .motifCoral{fill:none;stroke:#d68165;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>

  <rect width="1200" height="880" fill="url(#bg)"/>
  <rect width="1200" height="880" fill="url(#grid)"/>
  <circle cx="1050" cy="80" r="240" fill="url(#halo)"/>
  <circle cx="1050" cy="80" r="104" fill="none" stroke="#c9a45d" stroke-opacity=".22"/>
  <ellipse cx="1050" cy="80" rx="104" ry="34" fill="none" stroke="#48b7b0" stroke-opacity=".34" transform="rotate(-18 1050 80)"/>

  <text x="54" y="58" class="label">Godscar / Ilyon / cartridge-owned expression</text>
  <text x="54" y="100" style="font:800 42px system-ui,sans-serif;fill:#e7e1cf">A gift must remain refusible.</text>
  <text x="54" y="132" class="small">oceanic civic observatory · public goods · visible dependency · plural refusal</text>

  <g transform="translate(54 170)">
    <text class="label">Palette</text>
    <g transform="translate(0 24)">
      <rect width="154" height="42" rx="4" fill="#071827" stroke="#397d82"/><text x="12" y="27" class="small" fill="#e7e1cf">ABYSS #071827</text>
      <rect x="166" width="154" height="42" rx="4" fill="#0d6d78"/><text x="178" y="27" class="small" fill="#e7e1cf">OCEAN #0d6d78</text>
      <rect x="332" width="154" height="42" rx="4" fill="#48b7b0"/><text x="344" y="27" class="small" fill="#071827">TIDE #48b7b0</text>
      <rect x="498" width="154" height="42" rx="4" fill="#e7e1cf"/><text x="510" y="27" class="small" fill="#071827">NACRE #e7e1cf</text>
      <rect x="664" width="154" height="42" rx="4" fill="#d68165"/><text x="676" y="27" class="small" fill="#071827">CORAL #d68165</text>
      <rect x="830" width="154" height="42" rx="4" fill="#c9a45d"/><text x="842" y="27" class="small" fill="#071827">ARCHIVE #c9a45d</text>
    </g>
  </g>

