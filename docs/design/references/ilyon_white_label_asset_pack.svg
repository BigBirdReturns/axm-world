      <g transform="translate(528)"><rect class="panel" width="164" height="128" rx="8"/><path class="motif" d="M30 42Q48 20 66 42T102 42T138 42M30 66Q48 44 66 66T102 66T138 66M30 90Q48 68 66 90T102 90T138 90"/><text x="18" y="118" class="small">HEAR THE OCEAN</text></g>
