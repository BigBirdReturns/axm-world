name: Verify desktop routing receipt

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  routing:
    if: github.head_ref == 'agent/local-first-product-parity'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/local-first-product-parity
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - run: npx playwright install --with-deps chromium >/dev/null
      - name: Run the exact desktop routing path against an owned Vite server
        env:
          PW_BASE_URL: http://127.0.0.1:5173
        run: |
          set -euo pipefail
          mkdir -p routing-receipt
          npm run dev -- --host 127.0.0.1 >routing-receipt/vite.log 2>&1 &
          vite_pid=$!
          cleanup() {
            kill "$vite_pid" 2>/dev/null || true
            wait "$vite_pid" 2>/dev/null || true
          }
          trap cleanup EXIT
          for attempt in $(seq 1 60); do
            if curl -fsS "$PW_BASE_URL/axm-world/game/" >/dev/null; then break; fi
            sleep 1
          done
          export PW_CHROMIUM_PATH="$(node -e 'const { chromium } = require("playwright"); process.stdout.write(chromium.executablePath())')"
          npx playwright test e2e/program-001-routing.spec.ts \
            --project=desktop --workers=1 --reporter=list --trace=retain-on-failure \
            | tee routing-receipt/playwright.log
      - name: Upload routing receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-routing-receipt
          path: |
            routing-receipt
            test-results
          if-no-files-found: warn
          retention-days: 2
