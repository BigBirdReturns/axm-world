name: Diagnose browser modernization

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  exercise:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/local-first-product-parity
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - run: npx playwright install --with-deps chromium >/dev/null
      - name: Run complete desktop/mobile Chromium suite against owned Vite server
        id: browser
        continue-on-error: true
        env:
          PW_BASE_URL: http://127.0.0.1:5173
        run: |
          set -uo pipefail
          npm run dev -- --host 127.0.0.1 >"$RUNNER_TEMP/vite.log" 2>&1 &
          vite_pid=$!
          trap 'kill "$vite_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 60); do
            if curl -fsS "$PW_BASE_URL/axm-world/game/" >/dev/null; then break; fi
            sleep 1
          done
          export PW_CHROMIUM_PATH="$(node -e 'const { chromium } = require("playwright"); process.stdout.write(chromium.executablePath())')"
          set +e
          npx playwright test --workers=1 --reporter=json >"$RUNNER_TEMP/playwright.json" 2>"$RUNNER_TEMP/playwright.stderr"
          status=$?
          set -e
          printf '%s\n' "$status" >"$RUNNER_TEMP/status.txt"
          JSON_PATH="$RUNNER_TEMP/playwright.json" SUMMARY_PATH="$RUNNER_TEMP/browser-summary.txt" node <<'NODE'
          const fs = require('node:fs');
          const data = JSON.parse(fs.readFileSync(process.env.JSON_PATH, 'utf8'));
          const lines = [];
          const stats = data.stats ?? {};
          lines.push(`PLAYWRIGHT STATS expected=${stats.expected ?? 0} unexpected=${stats.unexpected ?? 0} skipped=${stats.skipped ?? 0} flaky=${stats.flaky ?? 0} durationMs=${stats.duration ?? 0}`);
          const projects = new Map();
          const skipped = [];
          function projectBucket(name) {
            if (!projects.has(name)) projects.set(name, { expected: 0, unexpected: 0, skipped: 0, flaky: 0 });
            return projects.get(name);
          }
          function walk(suites, parents = []) {
            for (const suite of suites ?? []) {
              const here = suite.title ? [...parents, suite.title] : parents;
              for (const spec of suite.specs ?? []) {
                for (const test of spec.tests ?? []) {
                  const project = test.projectName ?? test.projectId ?? 'unknown';
                  const bucket = projectBucket(project);
                  const title = [...here, spec.title].filter(Boolean).join(' > ');
                  const resultStatuses = (test.results ?? []).map((result) => result.status);
                  const failed = test.status === 'unexpected' || resultStatuses.some((status) => ['failed', 'timedOut', 'interrupted'].includes(status));
                  const flaky = test.status === 'flaky';
                  const isSkipped = test.status === 'skipped' || resultStatuses.every((status) => status === 'skipped');
                  if (failed) bucket.unexpected++;
                  else if (isSkipped) bucket.skipped++;
                  else if (flaky) bucket.flaky++;
                  else bucket.expected++;
                  if (isSkipped) {
                    const reason = (test.annotations ?? []).map((annotation) => annotation.description || annotation.type).filter(Boolean).join('; ');
                    skipped.push(`SKIP [${project}] ${title}${reason ? ` — ${reason}` : ''}`);
                  }
                  if (!failed) continue;
                  lines.push(`FAIL [${project}] ${title}`);
                  for (const result of test.results ?? []) {
                    if (!['failed', 'timedOut', 'interrupted'].includes(result.status)) continue;
                    const error = result.error ?? result.errors?.[0] ?? {};
                    const message = String(error.message ?? error.stack ?? error.value ?? 'no error message').replace(/\u001b\[[0-9;]*m/g, '');
                    lines.push(message.slice(0, 3200));
                  }
                }
              }
              walk(suite.suites, here);
            }
          }
          walk(data.suites);
          for (const [project, counts] of [...projects.entries()].sort()) {
            lines.splice(1, 0, `PROJECT ${project} expected=${counts.expected} unexpected=${counts.unexpected} skipped=${counts.skipped} flaky=${counts.flaky}`);
          }
          if (skipped.length) lines.push('', ...skipped);
          fs.writeFileSync(process.env.SUMMARY_PATH, `${lines.join('\n\n')}\n`);
          NODE
      - name: Upload complete browser receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: complete-browser-receipt
          path: |
            ${{ runner.temp }}/browser-summary.txt
            ${{ runner.temp }}/status.txt
            ${{ runner.temp }}/playwright.stderr
            ${{ runner.temp }}/vite.log
            test-results
          if-no-files-found: warn
          retention-days: 3

  report:
    if: always()
    needs: exercise
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: complete-browser-receipt
          path: receipt
      - name: Complete desktop/mobile Chromium receipt
        run: |
          cat receipt/browser-summary.txt
          test "$(cat receipt/status.txt)" -eq 0
