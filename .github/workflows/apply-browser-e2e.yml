name: Apply browser E2E modernization

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  issues: read

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Reconstruct authenticated patch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/world-browser"
          python - <<'PY'
          import base64, gzip, json, os
          from pathlib import Path
          from urllib.request import Request, urlopen
          parts=[
            ("H4sICKtLYGoCA3dvcmxkLWJyb3dz",2000),("1VGNsHRDXUCIKw6mJxqwg5dH",2000),
            ("gs81Id/YK/ElFhxm4N/E1y6M",2000),("rltx7jvV3qMfpJMgTdFRbL8G",2000),
            ("kWcLLR/LRhGakhe15akCCGnK",2000),("V3un+T9fwlpCRP0RwuyGb6pQ",2000),
            ("gzq6I418eLu7fSd6Rxv/C8u0",32)]
          req=Request(f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/issues/120/comments?per_page=100",headers={"Authorization":f"Bearer {os.environ['GH_TOKEN']}","Accept":"application/vnd.github+json"})
          with urlopen(req,timeout=30) as r: comments=json.load(r)
          out=[]
          for prefix,size in parts:
            found=[str(c.get('body','')).replace('\r','').replace('\n','') for c in comments if str(c.get('body','')).replace('\r','').replace('\n','').startswith(prefix) and len(str(c.get('body','')).replace('\r','').replace('\n',''))==size]
            if len(found)!=1: raise SystemExit(f"part {prefix}: {len(found)}")
            out.append(found[0])
          (Path(os.environ['RUNNER_TEMP'])/'world-browser'/'modernization.patch').write_bytes(gzip.decompress(base64.b64decode(''.join(out),validate=True)))
          PY
      - uses: actions/checkout@v4
        with:
          ref: agent/local-first-product-parity
          fetch-depth: 0
      - name: Apply E2E files and publish
        run: |
          set -euo pipefail
          git apply --index --exclude=src/world/experience/ExperienceHost.tsx "$RUNNER_TEMP/world-browser/modernization.patch"
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Modernize guided-entry browser receipts"
          git push origin HEAD:agent/local-first-product-parity
