name: Apply World product parity

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  issues: read
  pull-requests: read

concurrency:
  group: world-product-parity-publication
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/local-first-product-parity'
    runs-on: ubuntu-latest
    steps:
      - name: Reconstruct authenticated parity patch
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: '120'
          EXPECTED_PAYLOAD_SHA256: 5a67822831be07bafb0208005061a7747bb45b23327a345fecf0b256429266cb
          EXPECTED_PATCH_SHA256: 0ce737f65773d8327d7c394a9ecc3af38aaa5b8171f92dae7c27359dc74847c2
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/world-parity"
          python - <<'PY'
          import base64
          import gzip
          import hashlib
          import json
          import os
          from pathlib import Path
          from urllib.request import Request, urlopen

          prefixes = [
              "H4sICBhDYGoCA3dvcmxk",
              "TcAPihQHWyJyp+h/9Ti1",
              "k5URbiBHWc7InuF7K60S",
              "ewnP8yd//qN/8/Wf/vPs",
              "Mze3Ac8fu8vJIv0K5f4o",
          ]
          request = Request(
              f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/issues/{os.environ['ISSUE_NUMBER']}/comments?per_page=100",
              headers={
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urlopen(request, timeout=30) as response:
              comments = json.load(response)
          print(f"received {len(comments)} issue comments")

          parts = []
          for prefix in prefixes:
              matches = [str(comment.get("body", "")) for comment in comments if str(comment.get("body", "")).startswith(prefix)]
              if len(matches) != 1:
                  raise SystemExit(f"expected exactly one payload comment beginning {prefix!r}; found {len(matches)}")
              part = matches[0].replace("\r", "").replace("\n", "")
              print(f"payload part {len(parts)}: {len(part)} bytes")
              parts.append(part)

          payload = "".join(parts).encode("ascii")
          payload_sha = hashlib.sha256(payload).hexdigest()
          print(f"payload sha256: {payload_sha}")
          if payload_sha != os.environ["EXPECTED_PAYLOAD_SHA256"]:
              raise SystemExit("authenticated payload digest mismatch")

          compressed = base64.b64decode(payload, validate=True)
          patch = gzip.decompress(compressed)
          patch_sha = hashlib.sha256(patch).hexdigest()
          print(f"patch sha256: {patch_sha}")
          if patch_sha != os.environ["EXPECTED_PATCH_SHA256"]:
              raise SystemExit("authenticated patch digest mismatch")

          root = Path(os.environ["RUNNER_TEMP"]) / "world-parity"
          (root / "world-parity.patch.gz.b64").write_bytes(payload)
          (root / "world-parity.patch.gz").write_bytes(compressed)
          (root / "world-parity.patch").write_bytes(patch)
          PY

      - name: Check out publication branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply authenticated parity patch
        run: |
          set -euo pipefail
          if git apply --reverse --check "${RUNNER_TEMP}/world-parity/world-parity.patch"; then
            echo "World parity patch is already applied."
            echo "already_applied=true" >> "${GITHUB_ENV}"
            exit 0
          fi
          git apply --check "${RUNNER_TEMP}/world-parity/world-parity.patch"
          git apply --index "${RUNNER_TEMP}/world-parity/world-parity.patch"
          echo "already_applied=false" >> "${GITHUB_ENV}"

      - name: Set up Node
        if: env.already_applied == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: env.already_applied == 'false'
        run: npm ci

      - name: Verify complete World product parity
        if: env.already_applied == 'false'
        run: |
          find src tests e2e \( -name "*.js" -o -name "*.js.map" -o -name "*.d.ts" \) -delete
          rm -f tsconfig.tsbuildinfo
          npm run check
          npm run build
          git diff --cached --check

      - name: Publish reviewed source commit
        if: env.already_applied == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Complete World local-first product parity"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
