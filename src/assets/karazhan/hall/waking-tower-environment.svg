    </g>
    <g fill="#d19a3d" stroke="#17131d" stroke-width="4"><circle cx="64" cy="235" r="13"/><circle cx="332" cy="145" r="12"/><circle cx="252" cy="58" r="10"/></g>
    <path d="M42 430h336M210 368v96" stroke="#8a79b8" stroke-width="8"/>
    <path d="M160 432h100l22 46H138z" fill="#2a2034" stroke="#4f7d9e" stroke-width="5"/>
  </g>
  <g fill="none" stroke-linecap="round">
    <path d="M90 610c170-20 260-80 300-172 36-84 28-172-26-264" stroke="#0b0810" stroke-width="34"/>
    <path d="M1510 610c-170-20-260-80-300-172-36-84-28-172 26-264" stroke="#0b0810" stroke-width="34"/>
    <path d="M92 608c170-20 258-80 298-170 36-84 28-170-26-262" stroke="#746f7c" stroke-width="7"/>
    <path d="M1508 608c-170-20-258-80-298-170-36-84-28-170 26-262" stroke="#746f7c" stroke-width="7"/>
  </g>
  <g>
    <path d="M190 122h190v258l-95-54-95 54zM1220 122h190v258l-95-54-95 54z" fill="#342549" stroke="#8a79b8" stroke-width="6"/>
    <path d="M285 154v126M1315 154v126" stroke="#d19a3d" stroke-width="7"/>
    <g fill="none" stroke="#6faedb" stroke-width="5"><circle cx="285" cy="226" r="50"/><path d="M245 226h80M285 186v80"/><circle cx="1315" cy="226" r="50"/><path d="M1275 226h80M1315 186v80"/></g>
  </g>
  <g>
    <ellipse cx="258" cy="494" rx="132" ry="112" fill="url(#lantern)"/>
    <ellipse cx="1342" cy="494" rx="132" ry="112" fill="url(#lantern)"/>
    <path d="M230 476h56l-10 62h-36zM1314 476h56l-10 62h-36z" fill="#8cc9ea" stroke="#221a2c" stroke-width="7"/>
    <path d="M258 386v90M1342 386v90" stroke="#746f7c" stroke-width="8"/>
