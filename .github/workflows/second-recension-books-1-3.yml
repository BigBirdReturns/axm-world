name: Second Recension Books I-III World sync

on:
  push:
    branches: [codex/second-recension-books-1-3]
    paths:
      - '.github/workflows/second-recension-books-1-3.yml'
      - 'tools/second-recension-world/**'
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - '.github/workflows/second-recension-books-1-3.yml'
      - 'tools/second-recension-world/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: second-recension-books-1-3-world
  cancel-in-progress: true

jobs:
  sync:
    if: github.head_ref == 'codex/second-recension-books-1-3' || github.ref == 'refs/heads/codex/second-recension-books-1-3'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out exact World candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Vendor exact reviewed Arc Second Recension
        run: bash scripts/sync-engine.sh e4e41c7faec9755429c4f6b6f5ab715c5c3d17e5
      - name: Reconcile World identities, compatibility, tests, and documentation
        run: npx vite-node tools/second-recension-world/apply.ts | tee second-recension-world.log
      - name: Exact Arc provenance
        env:
          ENGINE_DRIFT_STRICT: '1'
        run: npm run engine:check
      - name: TypeScript
        run: npm run typecheck
      - name: Focused Second Recension contracts
        run: >-
          npm test --
          tests/world/second-recension-books-1-3.test.ts
          tests/world/bundled-digests.test.ts
          tests/world/legacy-revisions.test.ts
          tests/world/cartridge-parity.test.ts
          tests/world/program-of-record.test.ts
          tests/world/bundled-campaign-parity.test.ts
          tests/engine/connected-operation.test.ts
          tests/engine/connected-operation-fixture.test.ts
          tests/godscar/second-recension.test.ts
      - name: Complete World regression suite
        run: npm test
      - name: Production build
        run: npm run build
      - name: Upload reconciliation receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: second-recension-books-1-3-world-receipt
          path: second-recension-world.log
          if-no-files-found: warn
          retention-days: 14
      - name: Keep generated deployment output outside source authority
        run: git restore --source=HEAD --staged --worktree docs/game || true
      - name: Publish exact reviewed World candidate
        run: |
          rm -rf tools/second-recension-world
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git reset -- .github/workflows
          git commit -m "Vendor Second Recension addenda for Books I-III"
          git push origin HEAD:codex/second-recension-books-1-3
