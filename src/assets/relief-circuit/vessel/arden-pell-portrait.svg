  <path d="M154 712c48-54 88-66 120-38M486 712c-48-54-88-66-120-38" fill="none" stroke="#d3a97f" stroke-width="24" stroke-linecap="round"/>
  <path d="M138 800h364" stroke="#08070c" stroke-width="30"/>
  <rect width="640" height="800" filter="url(#grain)" opacity=".5"/>
</svg>