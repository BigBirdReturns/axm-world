      <path class="tide" d="M72 48L58 26M130 48L144 26M68 57L48 48M134 57L154 48"/>
      <path class="trim" d="M64 132Q101 150 138 132"/>
      <circle cx="89" cy="77" r="3" fill="#0d6d78"/><circle cx="113" cy="77" r="3" fill="#0d6d78"/>
      <text x="18" y="191" class="name">Sovereign Exception</text>
    </g>
  </g>

  <g transform="translate(54 548)">
    <text class="label">Six campaign beats</text>
    <g transform="translate(0 28)">
      <g transform="translate(0)"><rect class="panel" width="164" height="128" rx="8"/><path class="motifGold" d="M66 24H98V48H122V80H98V104H66V80H42V48H66Z"/><path class="tide" d="M42 102Q61 86 80 102T122 102"/><text x="18" y="118" class="small">END THE FEVER</text></g>
      <g transform="translate(176)"><rect class="panel" width="164" height="128" rx="8"/><circle cx="82" cy="64" r="10" fill="#48b7b0"/><circle cx="42" cy="34" r="8" fill="#48b7b0"/><circle cx="122" cy="34" r="8" fill="#48b7b0"/><circle cx="42" cy="94" r="8" fill="#48b7b0"/><circle cx="122" cy="94" r="8" fill="#48b7b0"/><path class="motif" d="M49 40L74 57M115 40L90 57M49 88L74 71M115 88L90 71"/><text x="18" y="118" class="small">MAP DEPENDENCY</text></g>
