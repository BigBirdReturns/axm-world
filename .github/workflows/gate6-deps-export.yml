name: Gate 6 dependency export

on:
  push:
    branches: [codex/gate6-common-ship-prep]
    paths:
      - '.github/workflows/gate6-deps-export.yml'
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - '.github/workflows/gate6-deps-export.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Pack dependencies
        run: tar -I 'zstd -19 -T0' -cf gate6-node-modules.tar.zst node_modules
      - uses: actions/upload-artifact@v4
        with:
          name: gate6-world-node-modules
          path: gate6-node-modules.tar.zst
          retention-days: 2
