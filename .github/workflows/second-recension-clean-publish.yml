name: Publish clean Second Recension Books I-III candidate

on:
  push:
    branches: [codex/second-recension-books-1-3]
    paths:
      - '.github/workflows/second-recension-clean-publish.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out clean target branch
        uses: actions/checkout@v4
        with:
          ref: codex/second-recension-books-1-3-clean
          fetch-depth: 0
      - name: Check out carrier source
        uses: actions/checkout@v4
        with:
          repository: BigBirdReturns/axm-world
          ref: codex/second-recension-books-1-3
          path: carrier-source
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Vendor exact reviewed Arc Second Recension
        run: bash scripts/sync-engine.sh e4e41c7faec9755429c4f6b6f5ab715c5c3d17e5
      - name: Apply World identity, compatibility, test, and documentation alignment
        run: |
          mkdir -p tools/second-recension-world
          cp carrier-source/tools/second-recension-world/apply.ts tools/second-recension-world/apply.ts
          npx vite-node tools/second-recension-world/apply.ts | tee second-recension-world.log
      - name: Replace superseded current digests outside the historical locator ledger
        run: |
          python - <<'PY'
          from pathlib import Path
          replacements = {
              'cart1_42d0aa17d6c01c6d11b0c2f944699d52b9a38c999b28302af9b972d736b2498a': 'cart1_ba733f8c95998158cbd44e448ddf36af6a585c8b3bf46febfb5e04bc9ebd2383',
              'cart1_30f8bd5e8102ae5ebedacbfc59ba8d8c1ab2a2a3177dad5f7781aac3a640f931': 'cart1_13f916633c0aa03c62a81e1829b3362983b75cda003b0597ff1ded6fc06f566c',
              'cart1_c5285f11cba0c4a40fb60db4310fd458f53a4a8775566159fb99610465bea5b1': 'cart1_fcf35f66782fdd109fb28ce4a08dde64968f05a1659a8701600a5a10b769ae90',
          }
          skip = Path('src/world/legacy-revisions.ts')
          suffixes = {'.ts', '.tsx', '.js', '.mjs', '.json', '.md', '.yml', '.yaml'}
          for path in Path('.').rglob('*'):
              if not path.is_file() or path == skip or path.suffix not in suffixes:
                  continue
              if any(part in {'.git', 'node_modules', 'dist', 'carrier-source'} for part in path.parts):
                  continue
              if path.parts[:2] == ('docs', 'game') or path.parts[:2] == ('.github', 'workflows'):
                  continue
              source = path.read_text()
              updated = source
              for old, new in replacements.items():
                  updated = updated.replace(old, new)
              if updated != source:
                  path.write_text(updated)
          for old in replacements:
              found = []
              for path in Path('.').rglob('*'):
                  if not path.is_file() or path == skip or path.suffix not in suffixes:
                      continue
                  if any(part in {'.git', 'node_modules', 'dist', 'carrier-source'} for part in path.parts):
                      continue
                  if path.parts[:2] == ('docs', 'game') or path.parts[:2] == ('.github', 'workflows'):
                      continue
                  if old in path.read_text(): found.append(str(path))
              if found: raise SystemExit(f'Superseded digest remains: {old}: {found}')
          PY
      - name: Exact Arc provenance
        env:
          ENGINE_DRIFT_STRICT: '1'
        run: npm run engine:check
      - name: TypeScript
        run: npm run typecheck
      - name: Focused Second Recension contracts
        run: >-
          npm test --
          tests/world/second-recension-books-1-3.test.ts
          tests/world/bundled-digests.test.ts
          tests/world/legacy-revisions.test.ts
          tests/world/cartridge-parity.test.ts
          tests/world/program-of-record.test.ts
          tests/world/bundled-campaign-parity.test.ts
          tests/engine/connected-operation.test.ts
          tests/engine/connected-operation-fixture.test.ts
          tests/godscar/second-recension.test.ts
      - name: Complete World regression suite
        run: npm test
      - name: Production build
        run: npm run build
      - name: Keep deployment output outside source authority
        run: git restore --source=HEAD --staged --worktree docs/game || true
      - name: Publish clean candidate
        run: |
          rm -rf carrier-source tools/second-recension-world second-recension-world.log
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git reset -- .github/workflows
          git commit -m "Vendor Second Recension addenda for Books I-III"
          git push origin HEAD:codex/second-recension-books-1-3-clean
