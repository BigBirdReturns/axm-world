name: Apply World product parity

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  issues: read
  pull-requests: read

concurrency:
  group: world-product-parity-publication
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/local-first-product-parity'
    runs-on: ubuntu-latest
    steps:
      - name: Reconstruct authenticated parity patch
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: '120'
          EXPECTED_PAYLOAD_SHA256: 5a67822831be07bafb0208005061a7747bb45b23327a345fecf0b256429266cb
          EXPECTED_PATCH_SHA256: 0ce737f65773d8327d7c394a9ecc3af38aaa5b8171f92dae7c27359dc74847c2
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/world-parity"
          python - <<'PY'
          import base64
          import gzip
          import hashlib
          import json
          import os
          from pathlib import Path
          from urllib.request import Request, urlopen

          expected_parts = [
              ("H4sICBhDYGoCA3dvcmxk", 20000),
              ("TcAPihQHWyJyp+h/9Ti1", 20000),
              ("k5URbiBHWc7InuF7K60S", 20000),
              ("ewnP8yd//qN/8/Wf/vPs", 20000),
              ("Mze3Ac8fu8vJIv0K5f4oYSaj", 5000),
              ("0EFEG5DLfefsDjYGhq0AGTFl", 5000),
              ("yl4u0fAyyD+AMGm6xeMlhKky", 632),
          ]
          request = Request(
              f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/issues/{os.environ['ISSUE_NUMBER']}/comments?per_page=100",
              headers={
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urlopen(request, timeout=30) as response:
              comments = json.load(response)

          parts = []
          for prefix, expected_length in expected_parts:
              matches = []
              for comment in comments:
                  body = str(comment.get("body", "")).replace("\r", "").replace("\n", "")
                  if body.startswith(prefix) and len(body) == expected_length:
                      matches.append(body)
              if len(matches) != 1:
                  raise SystemExit(
                      f"expected exactly one {expected_length}-byte payload comment beginning {prefix!r}; found {len(matches)}"
                  )
              parts.append(matches[0])

          payload = "".join(parts).encode("ascii")
          if hashlib.sha256(payload).hexdigest() != os.environ["EXPECTED_PAYLOAD_SHA256"]:
              raise SystemExit("authenticated payload digest mismatch")
          compressed = base64.b64decode(payload, validate=True)
          patch = gzip.decompress(compressed)
          if hashlib.sha256(patch).hexdigest() != os.environ["EXPECTED_PATCH_SHA256"]:
              raise SystemExit("authenticated patch digest mismatch")
          (Path(os.environ["RUNNER_TEMP"]) / "world-parity" / "world-parity.patch").write_bytes(patch)
          PY

      - name: Check out publication branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply and publish verified source
        run: |
          set -euo pipefail
          git apply --check "${RUNNER_TEMP}/world-parity/world-parity.patch"
          git apply --index "${RUNNER_TEMP}/world-parity/world-parity.patch"

          python - <<'PY'
          from pathlib import Path
          for relative in (
              "src/world/Player.tsx",
              "src/world/shell/Shell.tsx",
              "src/world/useArcInteraction.ts",
          ):
              path = Path(relative)
              path.write_bytes(path.read_bytes().replace(b"\r\n", b"\n"))
          PY
          git add src/world/Player.tsx src/world/shell/Shell.tsx src/world/useArcInteraction.ts

          # GitHub's workflow token cannot add a new workflow file. Publish the
          # already-verified source first; the permanent parity gate is added by
          # the controller immediately afterward through the repository API.
          git reset HEAD -- .github/workflows/bundled-parity.yml
          rm -f .github/workflows/bundled-parity.yml

          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Complete World local-first product parity"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
