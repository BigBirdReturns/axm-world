<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 800" role="img" aria-labelledby="title desc">
  <title id="title">Nima Quell, aquatic care worker</title>
  <desc id="desc">A large aquatic citizen suspended in a pressure-continuity care chamber, communicating through pressure song, electroreceptive lights, and a translated dry-space display.</desc>
  <defs>
    <linearGradient id="tank" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1c6f8c" stop-opacity=".9"/><stop offset=".48" stop-color="#0b4968" stop-opacity=".94"/><stop offset="1" stop-color="#052b47"/></linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#c7f0e6"/><stop offset=".32" stop-color="#73c7bf"/><stop offset=".66" stop-color="#3f8e91"/><stop offset="1" stop-color="#245369"/></linearGradient>
    <linearGradient id="fin" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e9ffd7" stop-opacity=".86"/><stop offset=".5" stop-color="#8fd9c7" stop-opacity=".6"/><stop offset="1" stop-color="#4a91a0" stop-opacity=".28"/></linearGradient>
    <radialGradient id="care" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#fff0b8" stop-opacity=".82"/><stop offset=".35" stop-color="#e6ba63" stop-opacity=".38"/><stop offset="1" stop-color="#e6ba63" stop-opacity="0"/></radialGradient>
    <radialGradient id="pulse" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#bdf8ff" stop-opacity=".8"/><stop offset=".4" stop-color="#6ed3e6" stop-opacity=".28"/><stop offset="1" stop-color="#6ed3e6" stop-opacity="0"/></radialGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%"><feTurbulence type="fractalNoise" baseFrequency=".68" numOctaves="3" seed="83"/><feComponentTransfer><feFuncA type="table" tableValues="0 .055"/></feComponentTransfer></filter>
  </defs>
  <rect width="640" height="800" fill="#06121b"/>
  <path d="M54 704V130Q54 40 144 40h352q90 0 90 90v574z" fill="url(#tank)" stroke="#6ed3e6" stroke-width="12"/>
  <path d="M84 682V144q0-72 72-72h328q72 0 72 72v538z" fill="#0b5d78" opacity=".28" stroke="#b8eff7" stroke-width="4"/>
  <path d="M86 214c120-46 234 44 352 2 52-18 88-42 116-70M86 362c132-42 242 42 352 4 52-18 88-40 116-66M86 518c118-46 226 34 342 4 54-14 94-38 126-68" fill="none" stroke="#d7fbff" stroke-width="6" opacity=".48"/>
  <circle cx="320" cy="388" r="214" fill="url(#pulse)" filter="url(#glow)" opacity=".42"/>

  <!-- broad aquatic body -->
  <path d="M194 226c62-88 190-88 252 0 52 74 54 194 18 292-24 66-72 124-144 164-72-40-120-98-144-164-36-98-34-218 18-292z" fill="url(#body)" stroke="#0a3448" stroke-width="12"/>
  <path d="M194 266c-66 42-102 112-104 194 52-46 98-68 138-66M446 266c66 42 102 112 104 194-52-46-98-68-138-66" fill="url(#fin)" stroke="#4e9ead" stroke-width="8"/>
  <path d="M210 510c-42 68-52 130-22 188 36-56 68-92 104-110M430 510c42 68 52 130 22 188-36-56-68-92-104-110" fill="url(#fin)" stroke="#4e9ead" stroke-width="8"/>
  <path d="M270 200c10-42 28-72 50-90 22 18 40 48 50 90" fill="url(#fin)" stroke="#4e9ead" stroke-width="8"/>

  <!-- face and electroreceptive pattern -->
  <path d="M246 290c20-40 46-62 74-62s54 22 74 62c-18 58-42 88-74 88s-56-30-74-88z" fill="#a6ddd1" stroke="#255c67" stroke-width="7"/>
  <ellipse cx="286" cy="296" rx="13" ry="18" fill="#062b3e"/><ellipse cx="354" cy="296" rx="13" ry="18" fill="#062b3e"/>
  <path d="M292 342c18 10 38 10 56 0" stroke="#477f7e" stroke-width="6" stroke-linecap="round"/>
  <g fill="#e6ba63"><circle cx="250" cy="252" r="7"/><circle cx="274" cy="226" r="6"/><circle cx="390" cy="252" r="7"/><circle cx="366" cy="226" r="6"/></g>
  <g fill="#bdf8ff"><circle cx="226" cy="324" r="6"/><circle cx="238" cy="358" r="5"/><circle cx="414" cy="324" r="6"/><circle cx="402" cy="358" r="5"/></g>

  <!-- care instruments and translated display -->
  <g transform="translate(108 92)"><path d="M0 0h154v82H0z" fill="#071923" stroke="#e6ba63" stroke-width="5"/><path d="M18 24h118M18 44h96M18 64h108" stroke="#8fd0c9" stroke-width="6"/></g>
  <g transform="translate(390 92)"><path d="M0 0h142v82H0z" fill="#071923" stroke="#6ed3e6" stroke-width="5"/><circle cx="38" cy="40" r="18" fill="#65a86c"/><path d="M72 26h52M72 42h42M72 58h48" stroke="#d7d0ff" stroke-width="6"/></g>
