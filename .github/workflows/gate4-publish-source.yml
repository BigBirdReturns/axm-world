name: Gate 4 source publication

on:
  pull_request:
    types: [ready_for_review, reopened]
    paths:
      - '.github/workflows/gate4-publish-source.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gate4-source-publication
  cancel-in-progress: true

jobs:
  publish:
    if: github.head_ref == 'codex/gate4-lamp-district-world'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/gate4-lamp-district-world
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Materialize the already-qualified Gate 4 source
        run: |
          set -euxo pipefail
          bash scripts/sync-engine.sh 5e934de9b662ea09da225d98d38a9ac7fe6607dc
          python tools/apply-gate4-world.py
          git restore --source=HEAD --staged --worktree docs/game || true
          # GITHUB_TOKEN publication cannot carry a workflow-file mutation. The
          # accepted permanent parity workflow is installed through the reviewed
          # connector immediately after this source commit.
          git restore --source=HEAD --staged --worktree .github/workflows/bundled-parity.yml
          git diff --check
          npm ci
          npm run typecheck
          npm test -- \
            tests/world/underworld-receiver.test.ts \
            tests/world/lamp-district-cartridge.test.ts \
            tests/world/program-of-record.test.ts \
            tests/world/bundled-campaign-parity.test.ts
      - name: Publish source without changing workflow files
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git reset -- .github/workflows
          git diff --cached --check
          git commit -m "Materialize the qualified Lamp District World source"
          git push origin HEAD:codex/gate4-lamp-district-world
