  <g transform="translate(54 742)">
    <text class="label">Institutional marks</text>
    <g transform="translate(0 24)">
      <circle cx="36" cy="36" r="26" class="motifGold"/><path class="motifGold" d="M36 10V62M10 36H62"/><circle cx="36" cy="36" r="10" fill="#c9a45d"/>
      <text x="78" y="32" class="name">Final Humanity</text><text x="78" y="52" class="small">integrated public good / integrated authority</text>
    </g>
    <g transform="translate(390 24)">
      <path class="motif" d="M10 56L18 22L32 40L40 16L48 40L62 22L70 56M8 10L72 66"/>
      <text x="92" y="32" class="name">Uncrowned Compact</text><text x="92" y="52" class="small">opacity / redundancy / costly refusal</text>
    </g>
    <g transform="translate(804 24)">
      <path class="motifGold" d="M12 62V32L40 12L68 32V62ZM24 62V42H56V62M12 32H68"/><path class="tide" d="M8 14Q20 4 32 14T56 14T76 10"/>
      <text x="92" y="32" class="name">Thalassic Houses</text><text x="92" y="52" class="small">continuity / rescue / hierarchy</text>
    </g>
  </g>
