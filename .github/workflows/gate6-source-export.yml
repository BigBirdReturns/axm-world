name: Gate 6 source export

on:
  push:
    branches: [codex/gate6-common-ship-prep]
    paths:
      - '.github/workflows/gate6-source-export.yml'
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - '.github/workflows/gate6-source-export.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out exact World candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Check out accepted Arc Gate 5
        uses: actions/checkout@v4
        with:
          repository: BigBirdReturns/axm-arc
          ref: 2abf84e4b79c8196bcfa213bca2e920e7d36caa5
          path: arc-source
          fetch-depth: 0
      - name: Record exact source identities
        run: |
          git rev-parse HEAD > world-source-sha.txt
          git -C arc-source rev-parse HEAD > arc-source-sha.txt
      - uses: actions/upload-artifact@v4
        with:
          name: gate6-world-and-arc-source
          path: |
            .
            !.git
            !arc-source/.git
            !node_modules
            !dist
            !docs/game
          include-hidden-files: true
          retention-days: 7
