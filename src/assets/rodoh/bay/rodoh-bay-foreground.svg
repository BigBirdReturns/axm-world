      <stop offset="0" stop-color="#b4e6a8" stop-opacity=".68"/>
      <stop offset=".5" stop-color="#74ad77" stop-opacity=".22"/>
      <stop offset="1" stop-color="#74ad77" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <path d="M0 0h160v900H0zM1600 0h-160v900h160z" fill="#050504" opacity=".92"/>
