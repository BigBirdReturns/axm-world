<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Rodoh Runtime</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <style>
      /* The document itself wears the runtime's ink. The boot/shell surfaces are
         viewport-sized absolute boxes; when their content scrolls past the first
         viewport, the overflow sits on <body> — which must not flash white. */
      html, body { margin: 0; background: #0b0a08; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/game/main.tsx"></script>
  </body>
</html>
