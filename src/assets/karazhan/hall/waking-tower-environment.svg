<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">The Waking Tower survey hall</title>
  <desc id="desc">A violet-night tower hall with blue survey lanterns, a moonlit orrery window, spiral galleries, chains, and a long raid table.</desc>
  <defs>
    <linearGradient id="nightWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#261c38"/>
      <stop offset=".52" stop-color="#151020"/>
      <stop offset="1" stop-color="#08050d"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#635977"/>
      <stop offset=".46" stop-color="#3b3348"/>
      <stop offset="1" stop-color="#17131d"/>
    </linearGradient>
    <linearGradient id="table" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b3d2b"/>
      <stop offset=".52" stop-color="#342219"/>
      <stop offset="1" stop-color="#17100d"/>
    </linearGradient>
    <radialGradient id="moon" cx="38%" cy="32%" r="74%">
      <stop offset="0" stop-color="#f3f2ff"/>
      <stop offset=".58" stop-color="#b9cce2"/>
      <stop offset="1" stop-color="#64758e"/>
    </radialGradient>
    <radialGradient id="lantern" cx="50%" cy="42%" r="68%">
      <stop offset="0" stop-color="#d9f1ff" stop-opacity=".98"/>
      <stop offset=".2" stop-color="#83c8ee" stop-opacity=".72"/>
      <stop offset=".58" stop-color="#4f7d9e" stop-opacity=".25"/>
      <stop offset="1" stop-color="#4f7d9e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rift" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#b9add9" stop-opacity=".64"/>
      <stop offset=".48" stop-color="#574a7a" stop-opacity=".24"/>
      <stop offset="1" stop-color="#574a7a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="masonry" width="110" height="54" patternUnits="userSpaceOnUse">
      <rect width="110" height="54" fill="#201827"/>
      <path d="M0 1H110M0 53H110M55 1V27M0 27H110M0 27V53M110 27V53" stroke="#43384f" stroke-width="3" opacity=".7"/>
      <path d="M8 9h35M65 37h35" stroke="#746f7c" stroke-width="2" opacity=".2"/>
    </pattern>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency=".72" numOctaves="3" seed="31" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .07"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#nightWall)"/>
  <rect x="0" y="110" width="1600" height="560" fill="url(#masonry)" opacity=".8"/>
  <ellipse cx="800" cy="410" rx="650" ry="390" fill="url(#rift)" opacity=".32"/>
  <path d="M70 660V220Q70 82 210 30M1530 660V220Q1530 82 1390 30" fill="none" stroke="#15101c" stroke-width="72"/>
  <path d="M84 660V228Q84 110 216 48M1516 660V228Q1516 110 1384 48" fill="none" stroke="#574a7a" stroke-width="9"/>
  <path d="M150 250H560M1040 250H1450M120 476H510M1090 476H1480" stroke="#756985" stroke-width="18" opacity=".75"/>
  <path d="M150 256H560M1040 256H1450M120 482H510M1090 482H1480" stroke="#4f7d9e" stroke-width="3" opacity=".7"/>
  <g stroke="#282030" stroke-width="16"><path d="M190 250v390M310 250v390M430 250v390M1170 250v390M1290 250v390M1410 250v390"/></g>
  <g transform="translate(590 58)">
