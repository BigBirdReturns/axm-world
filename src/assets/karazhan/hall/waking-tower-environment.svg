  <path d="M432 682h736l42 56H390z" fill="#1b1825" stroke="#4f7d9e" stroke-width="4"/>
  <g fill="none" stroke-width="4"><circle cx="800" cy="709" r="30" stroke="#d19a3d"/><path d="M755 709h90M800 664v90" stroke="#6faedb"/><path d="M520 700h120M960 700h120" stroke="#8a79b8"/></g>
  <path d="M410 776l-36 124M1190 776l36 124" stroke="#15100e" stroke-width="28"/>
  <rect width="1600" height="900" filter="url(#grain)" opacity=".55"/>
</svg>