name: Diagnose browser convergence

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  mobile-first-charter:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/local-first-product-parity
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - run: npx playwright install --with-deps chromium >/dev/null
      - name: Package exact release-candidate source
        run: |
          mkdir -p .diagnostic
          tar --exclude=.git --exclude=.diagnostic --exclude=node_modules -czf .diagnostic/axm-world-pr121-source.tgz .
          sha256sum .diagnostic/axm-world-pr121-source.tgz > .diagnostic/axm-world-pr121-source.sha256
      - name: Run exact mobile First Charter loop against owned Vite server
        id: mobile
        continue-on-error: true
        env:
          PW_BASE_URL: http://127.0.0.1:5173
        run: |
          set -uo pipefail
          npm run dev -- --host 127.0.0.1 >.diagnostic/vite.log 2>&1 &
          vite_pid=$!
          trap 'kill "$vite_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 60); do
            if curl -fsS "$PW_BASE_URL/axm-world/game/" >/dev/null; then break; fi
            sleep 1
          done
          export PW_CHROMIUM_PATH="$(node -e 'const { chromium } = require("playwright"); process.stdout.write(chromium.executablePath())')"
          set +e
          npx playwright test e2e/program-001-loop.spec.ts --project=mobile --workers=1 --reporter=json --trace=retain-on-failure >.diagnostic/playwright.json 2>.diagnostic/playwright.stderr
          status=$?
          set -e
          printf '%s\n' "$status" >.diagnostic/status.txt
          JSON_PATH=.diagnostic/playwright.json SUMMARY_PATH=.diagnostic/mobile-summary.txt node <<'NODE'
          const fs = require('node:fs');
          const data = JSON.parse(fs.readFileSync(process.env.JSON_PATH, 'utf8'));
          const stats = data.stats ?? {};
          const lines = [`MOBILE STATS expected=${stats.expected ?? 0} unexpected=${stats.unexpected ?? 0} skipped=${stats.skipped ?? 0} flaky=${stats.flaky ?? 0}`];
          function walk(suites, parents = []) {
            for (const suite of suites ?? []) {
              const here = suite.title ? [...parents, suite.title] : parents;
              for (const spec of suite.specs ?? []) {
                for (const test of spec.tests ?? []) {
                  const failed = test.status === 'unexpected' || (test.results ?? []).some((result) => ['failed', 'timedOut', 'interrupted'].includes(result.status));
                  if (!failed) continue;
                  lines.push(`FAIL [${test.projectName ?? test.projectId ?? 'unknown'}] ${[...here, spec.title].filter(Boolean).join(' > ')}`);
                  for (const result of test.results ?? []) {
                    if (!['failed', 'timedOut', 'interrupted'].includes(result.status)) continue;
                    const error = result.error ?? result.errors?.[0] ?? {};
                    const message = String(error.message ?? error.stack ?? error.value ?? 'no error message').replace(/\u001b\[[0-9;]*m/g, '');
                    lines.push(message.slice(0, 6000));
                  }
                }
              }
              walk(suite.suites, here);
            }
          }
          walk(data.suites);
          fs.writeFileSync(process.env.SUMMARY_PATH, `${lines.join('\n\n')}\n`);
          NODE
          cat .diagnostic/mobile-summary.txt
      - name: Upload exact source and mobile receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-first-charter-source-and-receipt
          path: |
            .diagnostic
            test-results
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 2
      - name: Preserve exact path status
        if: steps.mobile.outcome == 'failure'
        run: exit 1
