    <g transform="translate(432 28)">
      <rect class="panel" width="202" height="208" rx="8"/>
      <circle cx="101" cy="80" r="58" fill="#122f43"/>
      <path class="body" d="M58 172V124Q101 105 144 124V172Z"/>
      <path class="skin" d="M75 78Q75 45 101 40Q127 45 127 78Q124 108 101 112Q78 108 75 78Z"/>
      <path d="M67 64Q80 30 101 35Q122 30 135 64L126 58H76Z" fill="#1d344e" stroke="#071016" stroke-width="3"/>
      <path class="gold" d="M72 137H130"/>
      <circle cx="89" cy="77" r="3" fill="#071016"/><circle cx="113" cy="77" r="3" fill="#071016"/>
      <text x="18" y="191" class="name">Witness</text>
    </g>

    <g transform="translate(648 28)">
      <rect class="panel" width="202" height="208" rx="8"/>
      <circle cx="101" cy="80" r="58" fill="#1d4f4b"/>
      <path class="body" d="M48 172L58 118Q101 100 144 118L154 172Z"/>
      <path class="skin" d="M75 78Q75 45 101 40Q127 45 127 78Q124 108 101 112Q78 108 75 78Z"/>
      <path d="M68 57Q83 31 101 34Q119 31 134 57L126 64H76Z" fill="#2e6d63" stroke="#071016" stroke-width="3"/>
      <path class="trim" d="M55 127H147"/>
      <circle cx="89" cy="77" r="3" fill="#071016"/><circle cx="113" cy="77" r="3" fill="#071016"/>
      <text x="18" y="191" class="name">Protector</text>
    </g>

